apiVersion: apps/v1
kind: Deployment
metadata:
  name: "hello-world"
  labels:
    app: hello-world
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-world
  template:
    metadata:
      labels:
        app: hello-world
    spec:
      containers:
        - name: "hello-world-2"
          image: "jumapaul/hello-world:latest"
          ports:
            - containerPort: 8080

