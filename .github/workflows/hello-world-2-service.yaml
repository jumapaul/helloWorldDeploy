name: Deploying hello world 2 service
on:
  push:
    branches:
      - master
    paths:
      - 'hello-world-2/**'
jobs:
  build:
    name: Build and test hello world 2 service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hello-world-2
      outputs:
        image_tag: ${{ steps.vars.outputs.sha_short }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and run test
        run: ./gradlew clean build

      - name: Log into docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/hello-world-2:${{ steps.vars.outputs.sha_short }} .
      - name: Push Docker image to docker hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/hello-world-2:${{ steps.vars.outputs.sha_short }}
  update-manifest:
    name: Update image tag in deploy repo
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: jumapaul/helloWorldDeploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}

      - name: Update image tag
        run: |
          sed -i "s/tag: .*/tag: \"${{ needs.build.outputs.image_tag }}\"/" hello-world-2/helm-config/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add hello-world-2/helm-config/values.yaml
          git commit -m "chore: bump hello-world-2 image to ${{ needs.build.outputs.image_tag }}"
          git push